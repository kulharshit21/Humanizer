<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Humanizer Studio Architecture Flow</title>
  <desc id="desc">Animated flow from client UI to APIs, model providers, and storage.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2ff" />
      <stop offset="100%" stop-color="#ecfeff" />
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="box2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4338ca" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#1e1b4b" flood-opacity="0.18" />
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#4f46e5" />
    </marker>
    <style>
      .node {
        fill: url(#box);
        rx: 16;
        filter: url(#shadow);
      }
      .node-alt {
        fill: url(#box2);
        rx: 16;
        filter: url(#shadow);
      }
      .label {
        fill: #ffffff;
        font-size: 20px;
        font-family: Inter, Segoe UI, Arial, sans-serif;
        font-weight: 600;
      }
      .sub {
        fill: #dbeafe;
        font-size: 14px;
        font-family: Inter, Segoe UI, Arial, sans-serif;
      }
      .edge {
        fill: none;
        stroke: #4f46e5;
        stroke-width: 4;
        stroke-linecap: round;
        marker-end: url(#arrow);
        stroke-dasharray: 10 12;
        animation: dash 2.8s linear infinite;
      }
      .edge2 {
        fill: none;
        stroke: #06b6d4;
        stroke-width: 4;
        stroke-linecap: round;
        marker-end: url(#arrow);
        stroke-dasharray: 10 12;
        animation: dash 2.8s linear infinite reverse;
      }
      .pulse {
        animation: pulse 2.6s ease-in-out infinite;
        transform-origin: center;
      }
      @keyframes dash {
        from { stroke-dashoffset: 44; }
        to { stroke-dashoffset: 0; }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.02); }
      }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="360" fill="url(#bg)" rx="24" />

  <g class="pulse">
    <rect class="node" x="40" y="120" width="210" height="110" />
    <text class="label" x="145" y="165" text-anchor="middle">Client UI</text>
    <text class="sub" x="145" y="193" text-anchor="middle">Next.js + React</text>
  </g>

  <g class="pulse">
    <rect class="node-alt" x="305" y="55" width="220" height="95" />
    <text class="label" x="415" y="98" text-anchor="middle">/api/humanize</text>
    <text class="sub" x="415" y="122" text-anchor="middle">Rewrite + quality checks</text>
  </g>

  <g class="pulse">
    <rect class="node-alt" x="305" y="205" width="220" height="95" />
    <text class="label" x="415" y="248" text-anchor="middle">/api/detect</text>
    <text class="sub" x="415" y="272" text-anchor="middle">Signals + safeguards</text>
  </g>

  <g class="pulse">
    <rect class="node" x="590" y="55" width="255" height="95" />
    <text class="label" x="717.5" y="98" text-anchor="middle">Mistral API</text>
    <text class="sub" x="717.5" y="122" text-anchor="middle">Generation + refinement</text>
  </g>

  <g class="pulse">
    <rect class="node" x="590" y="205" width="255" height="95" />
    <text class="label" x="717.5" y="248" text-anchor="middle">Detector Orchestrator</text>
    <text class="sub" x="717.5" y="272" text-anchor="middle">Local + optional vendors</text>
  </g>

  <g class="pulse">
    <rect class="node-alt" x="900" y="120" width="260" height="110" />
    <text class="label" x="1030" y="165" text-anchor="middle">Supabase</text>
    <text class="sub" x="1030" y="193" text-anchor="middle">Auth, rewrites, scans, RLS</text>
  </g>

  <path class="edge" d="M250 155 C275 155, 280 103, 305 103" />
  <path class="edge2" d="M250 195 C275 195, 280 253, 305 253" />
  <path class="edge" d="M525 103 C550 103, 560 103, 590 103" />
  <path class="edge2" d="M525 253 C550 253, 560 253, 590 253" />
  <path class="edge" d="M845 103 C875 103, 875 145, 900 145" />
  <path class="edge2" d="M845 253 C875 253, 875 205, 900 205" />
</svg>

